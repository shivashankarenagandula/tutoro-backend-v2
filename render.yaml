# Render deploy config. Push this repo to GitHub, then in Render:
# New -> Blueprint -> connect this repo -> Render reads this file automatically.
#
# NOTE: This does NOT provision a database. Use Aiven's free PostgreSQL
# instead (permanent, no expiry) and paste its connection string into
# DATABASE_URL manually in Render's dashboard after first deploy.
# Render's own free Postgres add-on expires after 30 days -- avoid it.
#
# NOTE: Free tier has no Shell/SSH access, so `create_admin` (a custom,
# idempotent management command) creates your admin login automatically
# on every deploy from ADMIN_EMAIL / ADMIN_PHONE / ADMIN_PASSWORD below
# -- set those three in Render's dashboard, no shell needed.

services:
  - type: web
    name: tutoro-backend
    runtime: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python manage.py migrate && python manage.py loaddata mvp_seed_data && python manage.py create_admin && gunicorn config.wsgi"
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: DATABASE_URL
        sync: false   # set manually to your Aiven connection string
      - key: CORS_ALLOWED_ORIGINS
        sync: false   # set manually to your GitHub Pages URL
      - key: ADMIN_EMAIL
        sync: false   # set manually -- your admin login email
      - key: ADMIN_PHONE
        sync: false   # set manually -- your admin login phone
      - key: ADMIN_PASSWORD
        sync: false   # set manually -- your admin login password
